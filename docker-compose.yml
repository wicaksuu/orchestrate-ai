services:
  redis:
    image: redis:7-alpine
    container_name: sigma_redis
    command: redis-server --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sigma_network

  mariadb:
    image: mariadb:11
    container_name: sigma_mariadb
    environment:
      - MARIADB_DATABASE=${MARIADB_DATABASE:-sigma}
      - MARIADB_USER=${MARIADB_USER:-sigma}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-sigma_password}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-sigma_root_password}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - sigma_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigma_backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKSPACE_ROOT=/workspace/sandbox
      - LLM_PROVIDER=${LLM_PROVIDER:-simulated}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-6}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.5}
      - DATABASE_URL=mysql://${MARIADB_USER:-sigma}:${MARIADB_PASSWORD:-sigma_password}@mariadb:3306/${MARIADB_DATABASE:-sigma}
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-change-me}
    volumes:
      - ./backend:/app
      - ${EXTERNAL_PROJECT_PATH:-./sandbox}:/workspace/sandbox
      - /Users:/Users
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mariadb
    networks:
      - sigma_network
 
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigma_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sigma_network
 
volumes:
  redis_data:
  mariadb_data:

networks:
  sigma_network:
    driver: bridge
